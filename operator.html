<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a9bbc">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Visit Sark — Operator">
<link rel="manifest" href="manifest.json">
<title>Visit Sark — Operator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sea: #38b6cc; --sea-deep: #0e7fa0;
  --sand: #f5efe0; --cream: #fdfaf4;
  --ink: #1a2a2e; --fog: #7a9ea6;
  --success: #2e7d52; --error: #c0392b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Outfit', sans-serif; background: var(--sand); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }

.card { background: var(--cream); border-radius: 24px; padding: 32px 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,.1); text-align: center; }
.logo { font-size: 48px; margin-bottom: 12px; }
h1 { font-size: 22px; color: var(--sea-deep); margin-bottom: 6px; }
.subtitle { font-size: 13px; color: var(--fog); margin-bottom: 28px; }

/* Operator selector */
.op-tabs { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 24px; }
.op-tab { padding: 8px 16px; border: 2px solid var(--sea); border-radius: 20px; background: transparent; color: var(--sea-deep); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; }
.op-tab.active { background: var(--sea); color: #fff; }

/* Scan area */
#video-wrap { position: relative; width: 100%; aspect-ratio: 1; background: #000; border-radius: 16px; overflow: hidden; margin-bottom: 16px; display: none; }
#video-wrap.active { display: block; }
video { width: 100%; height: 100%; object-fit: cover; }
.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.scan-frame { width: 60%; aspect-ratio: 1; border: 3px solid var(--sea); border-radius: 12px; box-shadow: 0 0 0 9999px rgba(0,0,0,.45); }

/* Manual entry */
.or-divider { font-size: 11px; color: var(--fog); margin: 12px 0; letter-spacing: 2px; text-transform: uppercase; }
input[type=text] { width: 100%; padding: 12px 16px; border: 2px solid #e0d8c8; border-radius: 12px; font-size: 16px; font-family: 'Outfit', sans-serif; outline: none; transition: border .2s; }
input[type=text]:focus { border-color: var(--sea); }

.btn { width: 100%; padding: 14px; border: none; border-radius: 14px; background: var(--sea-deep); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; font-family: 'Outfit', sans-serif; transition: opacity .2s; }
.btn:hover { opacity: .85; }
.btn.secondary { background: transparent; color: var(--sea-deep); border: 2px solid var(--sea); margin-top: 8px; }

/* Result */
#result { display: none; border-radius: 14px; padding: 16px; margin-top: 16px; text-align: left; }
#result.valid   { background: #e8f5ee; border: 1px solid #a8d5b8; }
#result.invalid { background: #fdecea; border: 1px solid #f5a9a2; }
.result-icon { font-size: 28px; margin-bottom: 8px; }
.result-title { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
.result-detail { font-size: 13px; color: var(--fog); line-height: 1.5; }

/* Scan log */
.log-section { margin-top: 24px; text-align: left; }
.log-title { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--fog); margin-bottom: 10px; }
.log-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }
.log-item { display: flex; gap: 10px; align-items: center; padding: 8px 10px; background: var(--sand); border-radius: 10px; font-size: 12px; }
.log-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.log-item .dot.valid { background: var(--success); }
.log-item .dot.invalid { background: var(--error); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">🎟️</div>
  <h1>Visit Sark — Operator</h1>
  <p class="subtitle">Scan or enter a booking reference to validate</p>

  <div class="op-tabs">
    <button class="op-tab active" onclick="setOp('bus',this)">🚌 Bus</button>
    <button class="op-tab" onclick="setOp('carriage',this)">🐴 Carriage</button>
    <button class="op-tab" onclick="setOp('bike',this)">🚲 Bikes</button>
    <button class="op-tab" onclick="setOp('adventure',this)">🧗 Adventure</button>
    <button class="op-tab" onclick="setOp('food',this)">🍽️ Food</button>
    <button class="op-tab" onclick="setOp('walk',this)">🥾 Walks</button>
  </div>

  <div id="video-wrap">
    <video id="video" playsinline autoplay muted></video>
    <div class="scan-overlay"><div class="scan-frame"></div></div>
  </div>

  <button class="btn" id="scan-btn" onclick="startScan()">📷 Scan QR Code</button>

  <div class="or-divider">— or enter manually —</div>
  <input type="text" id="ref-input" placeholder="Booking reference" autocomplete="off" autocapitalize="characters">
  <button class="btn secondary" onclick="validateManual()">Validate Reference</button>

  <div id="result"></div>

  <div class="log-section">
    <div class="log-title">Scan Log</div>
    <div class="log-list" id="log-list"></div>
  </div>
</div>

<script>
let currentOp = 'bus';
let scanLog = [];

function setOp(op, el) {
  currentOp = op;
  document.querySelectorAll('.op-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

async function startScan() {
  const wrap = document.getElementById('video-wrap');
  const video = document.getElementById('video');
  wrap.classList.add('active');
  document.getElementById('scan-btn').textContent = '⏹ Stop Scanning';
  document.getElementById('scan-btn').onclick = stopScan;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;

    // QR scanning requires a library — jsQR is loaded below
    scanFrame(video);
  } catch (err) {
    showResult(false, 'Camera error', err.message);
    stopScan();
  }
}

function stopScan() {
  const video = document.getElementById('video');
  if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
  document.getElementById('video-wrap').classList.remove('active');
  document.getElementById('scan-btn').textContent = '📷 Scan QR Code';
  document.getElementById('scan-btn').onclick = startScan;
}

let scanning = false;
function scanFrame(video) {
  if (!video.srcObject) return;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const code = typeof jsQR !== 'undefined' ? jsQR(imageData.data, imageData.width, imageData.height) : null;
  if (code) {
    stopScan();
    validateToken(code.data);
  } else {
    requestAnimationFrame(() => scanFrame(video));
  }
}

async function validateManual() {
  const ref = document.getElementById('ref-input').value.trim();
  if (!ref) return;
  validateToken(ref);
}

async function validateToken(token) {
  // TODO: replace with real worker URL
  const WORKER_URL = 'https://visit-sark-worker.YOUR_SUBDOMAIN.workers.dev';

  try {
    const res = await fetch(`${WORKER_URL}/ticket/validate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, operator: currentOp }),
    });
    const data = await res.json();
    if (data.valid) {
      showResult(true, '✅ Valid Ticket', `${data.booking?.description ?? 'Booking confirmed'}\nRef: ${data.booking?.reference ?? token}`);
      addLog(true, token.slice(0, 8));
    } else {
      showResult(false, '❌ Invalid', data.reason ?? 'Ticket not valid');
      addLog(false, token.slice(0, 8));
    }
  } catch (err) {
    // Demo mode — no worker connected
    showResult(true, '✅ Valid (Demo)', 'Worker not connected — demo mode only');
    addLog(true, token.slice(0, 8));
  }
}

function showResult(valid, title, detail) {
  const el = document.getElementById('result');
  el.className = valid ? 'valid' : 'invalid';
  el.style.display = 'block';
  el.innerHTML = `
    <div class="result-icon">${valid ? '✅' : '❌'}</div>
    <div class="result-title">${title}</div>
    <div class="result-detail">${detail.replace(/\n/g,'<br>')}</div>
  `;
  setTimeout(() => { el.style.display = 'none'; }, 6000);
}

function addLog(valid, ref) {
  scanLog.unshift({ valid, ref, time: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) });
  const list = document.getElementById('log-list');
  list.innerHTML = scanLog.slice(0, 20).map(l =>
    `<div class="log-item"><div class="dot ${l.valid ? 'valid' : 'invalid'}"></div>${l.time} — ${l.ref}… — ${l.valid ? 'Valid' : 'Invalid'}</div>`
  ).join('');
}
</script>
<!-- jsQR for QR code decoding from camera frames -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</body>
</html>
